<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>
        <img id="bin" src="img/1.png" alt-"Bin">
        <img class="folder" id="Red" src="img/2.png" alt="Folder">
        <img class="folder" id="Yellow" src="img/3.png" alt="Folder">
        <img class="Folder" id="Green" src="img/4.png" alt="Folder">
    </p>
    <fieldset>
        <legend>Folders Dropped:</legend>
        <ol id="list"></ol>
    </fieldset>
    <script>
        document.addEventListener('DOMContentLoaded', dragNdrop)
        function dragNdrop(){
            const bin = document.getElementById('bin')
            const folders = document.getElementsByClassName('folder')
            const list = document.getElementById('list')
            let i=0
            for(i=0;i<folders.length;i++){
                folders[i].ondragstart = function(event){
                    event.dataTransfer.setData('Text',this.id)
                }
            }
            bin.ondragover = function(event){return false}
            bin.ondrop = function(event){
                const did = event.dataTransfer.getData('Text')
                const tag = document.getElementById(did)
                if(did==="bin"){
                    return false
                }
                else{
                    list.innerHTML += '<li>'+did
                }
                tag.parentNode.removeChild(tag)
            }
        }
    </script>
</body>
</html>
